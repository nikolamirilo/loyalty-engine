<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="logo-bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6d5ef0" />
      <stop offset="1" stop-color="#4c3fbf" />
    </linearGradient>
    <linearGradient id="logo-hl" x1="0" y1="0" x2="0" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20" />
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Tile: indigo-violet plane, soft top highlight, hairline inner edge -->
  <rect width="40" height="40" rx="11" fill="url(#logo-bg)" />
  <rect width="40" height="40" rx="11" fill="url(#logo-hl)" />
  <rect x="0.7" y="0.7" width="38.6" height="38.6" rx="10.3" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1.2" />

  <!-- Box body (two-tone: tinted fill, crisp edge) -->
  <rect x="9" y="18" width="22" height="13" rx="2.5" fill="#ffffff" fill-opacity="0.18" stroke="#ffffff" stroke-width="2" stroke-linejoin="round" />

  <!-- Ribbon down the front -->
  <rect x="17.4" y="19" width="5.2" height="12" fill="#ffffff" fill-opacity="0.34" />

  <!-- Lid (solid) -->
  <rect x="6.5" y="12.8" width="27" height="6.4" rx="2.4" fill="#ffffff" />

  <!-- Bow -->
  <path d="M20 12.6C18.7 9.4 15.3 8.5 13.8 10.4C12.7 11.8 13.6 12.8 20 12.6Z" fill="#ffffff" />
  <path d="M20 12.6C21.3 9.4 24.7 8.5 26.2 10.4C27.3 11.8 26.4 12.8 20 12.6Z" fill="#ffffff" />
  <circle cx="20" cy="12.3" r="1.7" fill="#ffffff" />
</svg>
